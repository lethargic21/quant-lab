# 유니버스 설정
#
# mode: debug | full
#   debug — 아래 debug_tickers 5종목만 사용 (개발/디버깅, 빠른 반복)
#   full  — KOSPI 시총 상위 full_size 보통주 (최종 실행)
#
# ⚠️ full 모드의 두 겹 근사 (README 한계 절에 명시):
#   1. KRX 지수구성종목 API가 봇 차단이라 실제 KOSPI200 조회 불가
#      → FDR StockListing("KOSPI") 시총 상위 200 보통주로 근사
#   2. 조회 시점 스냅샷 — 과거 편입/편출 미반영 (survivorship bias)

mode: full

full_size: 200

