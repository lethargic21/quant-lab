# 파이프라인 전역 설정

period:
  start: "2019-01-01"
  end: "2024-12-31"

random_seed: 42

# 타이밍 (절대 원칙 1 — look-ahead 방지)
timing:
  market_close: "15:30"       # 이 시각 이전 접수 공시 → 당일 종가 체결 가능
                              # 이후 접수 → 익영업일 체결 가능 (보수적 가정)

# 거래비용 (절대 원칙 4)
costs:
  transaction_tax: 0.0020     # 고정 세율 (use_tax_schedule=false일 때)
  slippage: 0.0010            # 편도 슬리피지 가정 (파라미터)
  commission: 0.00015         # v1.2 [3] 위탁수수료 편도 (온라인 기준)
  use_tax_schedule: true      # v1.2 [3] KOSPI 시행일별 거래세 스케줄
                              # (2019 0.30→0.25%, 2021 0.23%, 2023 0.20%, 2024 0.18%)
                              # false면 transaction_tax 고정 — 전환 비교는 커밋 로그 참조

# 이벤트별 방향 룰 (초안 — 조정 가능, 조정 시 이력 기록)
direction_rules:
  buyback:
    direction: 1              # 호재 고정
    # strength = 취득예정금액 / 공시 전일 시가총액

  rights_offering:
    # 배정방식별 기본 방향
    by_allocation:
      주주배정: -1
      주주배정후실권주일반공모: -1
      일반공모: -1
      제3자배정: 0             # 중립~호재 (전략적 투자자 여부는 Phase 2에서 판별 시도)
    # 자금 목적 보정 (기본 방향에 가산)
    purpose_adjustment:
      채무상환: -0.5
      시설자금: +0.5
      타법인증권취득: +0.5
      운영자금: 0
    # strength = 시총 대비 희석률 기반

  earnings:
    # 서프라이즈 = YoY 기준 (QoQ는 병행 계산·리포트만)
    # direction = sign(YoY 서프라이즈), strength = 크기
    surprise_metric: yoy
    report_also: [qoq]

# 백테스트 — 테스트한 보유기간 전부 리포트 (절대 원칙 5)
backtest:
  holding_days: [5, 20]       # 거래일 기준 보유기간 (진입: 시그널일 종가)
  delist_discount: 0.30       # v1.2 #1: 상폐 추정 종목 보유 시 마지막 유효가 대비 청산 할인
                              # (null이면 기존 동작 — 상폐 손실 미반영). 현 유니버스(생존
                              # 스냅샷)엔 상폐 종목이 없어 결과 불변, survivorship 보정 대비용
  subperiods:                 # v1.2 [6] 서브기간 안정성 점검 (전 기간 결과와 병기)
    - ["2019-01-01", "2021-12-31"]
    - ["2022-01-01", "2024-12-31"]

# 이벤트 스터디 윈도우 — 테스트한 것 전부 리포트 (절대 원칙 5)
event_study:
  estimation_window: 120      # 정상수익률 추정 기간 (거래일)
  gap: 10                     # 추정 기간과 이벤트 사이 갭
  car_windows:
    - [-1, 1]
    - [0, 5]
    - [0, 20]
